services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: snuffle-clickhouse
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DB: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/config.d/time_series.xml:/etc/clickhouse-server/config.d/time_series.xml:ro
      - ./docker/clickhouse/users.d/time_series.xml:/etc/clickhouse-server/users.d/time_series.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  clickhouse_data:
