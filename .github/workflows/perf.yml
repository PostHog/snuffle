name: perf

on:
  pull_request: {}
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run perf suite
        env:
          PERF_FAIL_ON_SLOWER: "true"
          PERF_COMPARE_TOLERANCE: "0"
        run: make perf-test
      - name: Upload perf artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-artifacts
          path: |
            .perf/**
            perf-results.json
          if-no-files-found: ignore
      - name: Stop ClickHouse
        if: always()
        run: docker compose down -v
